name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Check ruff format
        run: |
          uv run ruff format --check .
          # Fail if format differs — forces contributors to run `ruff format`

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -v

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install hatchling
        run: uv pip install hatchling

      - name: Build package
        run: uv run hatchling build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/lightdash_mcp-*.whl && echo "✅ wheel created"
          test -f dist/lightdash_mcp-*.tar.gz && echo "✅ sdist created"
