name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: ~/.local/bin/uv sync

      - name: Run ruff check
        run: |
          echo "=== UV version ===" && ~/.local/bin/uv --version
          echo "=== uvx ruff check ===" && ~/.local/bin/uvx ruff check lightdash_mcp/

      - name: Check ruff format
        run: |
          ~/.local/bin/uvx ruff format --check lightdash_mcp/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: ~/.local/bin/uv sync --extra dev

      - name: Run tests
        run: ~/.local/bin/uv run pytest -v

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: ~/.local/bin/uv sync

      - name: Install hatchling
        run: ~/.local/bin/uv pip install hatchling

      - name: Build package
        run: ~/.local/bin/uv run hatchling build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/lightdash_mcp-*.whl && echo "✅ wheel created"
          test -f dist/lightdash_mcp-*.tar.gz && echo "✅ sdist created"
