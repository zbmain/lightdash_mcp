name: Self-Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at 3am UTC to catch drift
    - cron: "0 3 * * 0"

permissions:
  contents: read

jobs:
  repo-health:
    name: Repository Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required_files=(
            "README.md"
            "LICENSE"
            "pyproject.toml"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            ".gitignore"
            ".pre-commit-config.yaml"
            ".editorconfig"
            ".github/workflows/ci.yml"
          )
          missing=()
          for f in "${required_files[@]}"; do
            if [[ ! -f "$f" ]]; then
              missing+=("$f")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing required files: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required files present"

      - name: Check .gitignore is comprehensive
        run: |
          required_patterns=(
            ".env"
            ".venv"
            "__pycache__"
            "build/"
            "dist/"
            "*.egg-info"
            ".ruff_cache"
            ".mcp.json"
          )
          missing=()
          for pattern in "${required_patterns[@]}"; do
            if ! grep -q "$pattern" .gitignore; then
              missing+=("$pattern")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ .gitignore missing patterns: ${missing[*]}"
            exit 1
          fi
          echo "✅ .gitignore is comprehensive"

      - name: Check no secrets in committed files
        run: |
          # Check for common secret patterns in non-ignored files
          if grep -rE "(ldpat_|ldt_[a-zA-Z0-9]{20,}|sk-[a-zA-Z0-9]{20,})" \
            --include="*.py" --include="*.yaml" --include="*.yml" \
            --include="*.json" --include="*.sh" \
            --exclude-dir=.git \
            --exclude="*.egg-info" \
            . 2>/dev/null; then
            echo "❌ Possible secrets detected!"
            exit 1
          fi
          echo "✅ No obvious secrets in committed files"

      - name: Check LICENSE year is current
        run: |
          year=$(date +%Y)
          if grep -q "Copyright (c) $year" LICENSE; then
            echo "✅ LICENSE year is current ($year)"
          else
            echo "⚠️  LICENSE year may need update (expected $year)"
          fi

  pre-commit:
    name: Pre-Commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python pin 3.11

      - name: Install pre-commit
        run: uv tool install pre-commit --python 3.11

      - name: Run pre-commit
        run: uvx pre-commit run --all-files

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Check for insecure dependencies
        run: |
          uv pip install pip-audit
          uv run pip-audit --format=pip --no-deps 2>/dev/null || true
        continue-on-error: true
