services:
  lightdash-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: lightdash-mcp
    ports:
      - "${LIGHTDASH_MCP_HTTP_PORT:-8080}:8080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
