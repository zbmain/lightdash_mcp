services:
  lightdash-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: lightdash-mcp
    ports:
      - "${LIGHTDASH_MCP_HTTP_PORT:-8082}:8082"
    environment:
      - LIGHTDASH_URL=${LIGHTDASH_URL}
      - LIGHTDASH_TOKEN=${LIGHTDASH_TOKEN}
      - LIGHTDASH_PROJECT_UUID=${LIGHTDASH_PROJECT_UUID}
      - LIGHTDASH_MCP_HTTP_HOST=0.0.0.0
      - LIGHTDASH_MCP_HTTP_PORT=8082
      - LIGHTDASH_MCP_HTTP_APIKEY=${LIGHTDASH_MCP_HTTP_APIKEY}
      - CPVMATCH_APIKEY=${CPVMATCH_APIKEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
